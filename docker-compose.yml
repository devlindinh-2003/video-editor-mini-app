services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${PORT:-3000}:${PORT:-3000}"
    cpus: 0.5
    mem_limit: 1g
    volumes:
      - ./data:/app/data
    env_file:
      - .env
    healthcheck:
      test: [
        "CMD", 
        "node", 
        "-e", 
        "fetch('http://localhost:' + (process.env.PORT || 3000) + '/health').then(r => r.ok ? process.exit(0) : process.exit(1)).catch(() => process.exit(1))"
      ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
